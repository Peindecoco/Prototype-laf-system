<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | FEU Lost & Found</title>

  <link rel="icon" type="image/x-icon" href="assets/web_icon.png">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="report_sheet.css">
</head>

<body>
  <div class="container">
    <header>
      <img src="assets/feu_hs_logo.png" alt="FEU Logo" class="title-img">
      <img src="assets/feu_hs_laf.png" alt="Lost and Found" class="title-text">
    </header>

    <nav>
      <a href="index.html"><span class="gold-text">01</span> HOME</a>
      <a href="report.html"><span class="gold-text">02</span> REPORT</a>
      <a href="#"><span class="gold-text">03</span> HELP</a>
    </nav>

    <div class="main-admin">
      <div class="report-sheet-admin">
        <h1>Admin | Add Found Item</h1>

        <form class="report-form" id="adminForm" enctype="multipart/form-data">
          <input name="adminSecret" placeholder="Admin Secret" required>
          <input name="name" placeholder="Item Name" required>
          <input name="description" placeholder="Description (include identifying/secret details)" required>
          <input name="color" placeholder="Color Name" required>
          <input name="size" placeholder="Size" required>
          <input name="locationFound" placeholder="Location Found" required>

          <select name="category" required>
            <option value="" disabled selected>Select filter category</option>
            <option value="school">School Supplies</option>
            <option value="personal">Personal Items</option>
            <option value="bag-cont">Bags / Containers</option>
            <option value="electronics">Electronics</option>
            <option value="id-small">ID / Small Valuables</option>
            <option value="all">Other / All</option>
          </select>

          <input type="file" name="image" accept="image/*">
          <button type="submit" class="btn">Submit</button>
        </form>

        <p id="msg"></p>
      </div>
    </div>

    <footer><div class="footer-content"><p>&copy; 2026 FEU High School Lost and Found</p><p>Powered by FEU Tech Team</p></div></footer>
  </div>

  <script>
    const form = document.getElementById('adminForm');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = '';
      const formData = new FormData(form);

      try {
        const res = await fetch('/api/admin/add-found', { method: 'POST', body: formData });
        const json = await res.json();
        msg.textContent = res.ok ? (json.message || 'Item added successfully') : (json.error || json.message || 'Upload failed');
        if (res.ok) form.reset();
      } catch (err) {
        msg.textContent = 'Error: ' + err.message;
      }
    });
  </script>
</body>
</html>
